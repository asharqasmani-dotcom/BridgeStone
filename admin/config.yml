backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Website Content"
    files:

      # ── HERO ──────────────────────────────────────────────────
      - name: "hero"
        label: "🏠 Hero Section"
        file: "content.json"
        fields:
          - label: "Navigation Brand Name"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Brand Name", name: "brand", widget: "string" }
              - label: "Navigation Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Link Label", name: "label", widget: "string" }
                  - { label: "Link URL", name: "url", widget: "string" }

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow Tag (small text above heading)", name: "eyebrow", widget: "string" }
              - { label: "Title — Line 1", name: "title_prefix", widget: "string" }
              - { label: "Title — Italic Word (shown in orange)", name: "title_italic", widget: "string" }
              - { label: "Title — Line 3", name: "title_suffix", widget: "string" }
              - { label: "Subtitle Paragraph", name: "subtitle", widget: "text" }
              - { label: "Button Text", name: "cta", widget: "string" }
              - { label: "Button Link", name: "cta_url", widget: "string" }

          # ── SERVICES ────────────────────────────────────────
          - label: "Services Section"
            name: "services"
            widget: "object"
            fields:
              - { label: "Section Label (small orange text)", name: "label", widget: "string" }
              - { label: "Section Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "cta", widget: "string" }
              - { label: "Button Link", name: "cta_url", widget: "string" }
              - label: "Service Cards"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Card Title", name: "title", widget: "string" }
                  - { label: "Card Description", name: "desc", widget: "text" }
                  - label: "Icon"
                    name: "icon"
                    widget: "select"
                    options:
                      - { label: "Wrench (Operations)", value: "operations" }
                      - { label: "Book (Advisory)", value: "advisory" }
                      - { label: "Star (Amenities)", value: "amenities" }
                      - { label: "Dollar (Finance)", value: "finance" }
                      - { label: "Monitor (Technology)", value: "technology" }
                      - { label: "Shield (Sustainability)", value: "sustainability" }
                      - { label: "Box (Supply Chain)", value: "supply-chain" }
                      - { label: "Warning (Risk)", value: "risk" }

          # ── QUOTE ────────────────────────────────────────────
          - label: "Quote Band"
            name: "quote"
            widget: "object"
            fields:
              - { label: "Quote Text", name: "text", widget: "text" }
              - { label: "Attribution (name below quote)", name: "attribution", widget: "string" }

          # ── DIFFERENCE ──────────────────────────────────────
          - label: "The Brightstone Difference Section"
            name: "difference"
            widget: "object"
            fields:
              - { label: "Section Label (small orange text)", name: "label", widget: "string" }
              - { label: "Section Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "cta", widget: "string" }
              - { label: "Button Link", name: "cta_url", widget: "string" }
              - label: "Difference Cards"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Number (e.g. 01)", name: "num", widget: "string" }
                  - { label: "Card Title", name: "title", widget: "string" }
                  - { label: "Card Description", name: "desc", widget: "text" }
                  - { label: "Featured Card? (dark background)", name: "featured", widget: "boolean", default: false }
                  - label: "Icon"
                    name: "icon"
                    widget: "select"
                    options:
                      - { label: "People (Team)", value: "team" }
                      - { label: "Chart (Decision)", value: "chart" }
                      - { label: "Home (Resident)", value: "home" }
                      - { label: "Smart Screen", value: "smart" }

          # ── FOOTER ──────────────────────────────────────────
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Brand Name", name: "brand", widget: "string" }
              - { label: "Copyright Text", name: "copyright", widget: "string" }
              - label: "Footer Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Link Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }

          # ── CONTACT ─────────────────────────────────────────
          - label: "Contact / Floating Buttons"
            name: "contact"
            widget: "object"
            fields:
              - { label: "WhatsApp Link (e.g. https://wa.me/919876543210)", name: "whatsapp", widget: "string" }
              - { label: "Email Link (e.g. mailto:hello@brightstone.co.in)", name: "email", widget: "string" }
