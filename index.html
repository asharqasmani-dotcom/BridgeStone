<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brightstone — Residential Property Management Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:        #0d1f2d;
      --navy-mid:    #1a3347;
      --navy-light:  #254360;
      --orange:      #e07b2a;
      --orange-2:    #f0952a;
      --orange-pale: #fff3e6;
      --white:       #ffffff;
      --gray-50:     #f7f9fb;
      --gray-100:    #eef1f5;
      --gray-200:    #dde3ea;
      --gray-400:    #96aabb;
      --gray-600:    #5a7080;
      --text:        #0d1f2d;
      --radius:      10px;
      --transition:  0.35s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; font-size:16px; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: var(--white);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAVBAR ─────────────────────────────────────────────── */
    .nav {
      position: fixed; inset: 0 0 auto 0; z-index: 900;
      padding: 22px 64px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background var(--transition), padding var(--transition), box-shadow var(--transition);
    }
    .nav.scrolled {
      background: rgba(10,20,32,0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 15px 64px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.35);
    }
    .nav-logo { display:flex; align-items:center; gap:11px; text-decoration:none; }
    .nav-logo-icon { width:38px; height:38px; flex-shrink:0; }
    .nav-logo-text { font-size:17px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--white); }
    .nav-list { list-style:none; display:flex; gap:44px; }
    .nav-list a {
      font-size:11.5px; font-weight:600; letter-spacing:1.8px; text-transform:uppercase;
      color:rgba(255,255,255,0.72); text-decoration:none;
      position:relative; padding-bottom:3px; transition:color var(--transition);
    }
    .nav-list a::after {
      content:''; position:absolute; bottom:0; left:0;
      width:0; height:1.5px; background:var(--orange); transition:width var(--transition);
    }
    .nav-list a:hover { color:var(--white); }
    .nav-list a:hover::after { width:100%; }

    /* ── HERO ───────────────────────────────────────────────── */
    .hero {
      position:relative; min-height:100svh;
      display:flex; align-items:center; overflow:hidden; background:var(--navy);
    }
    .hero-bg {
      position:absolute; inset:0;
      background:
        radial-gradient(ellipse 90% 55% at 75% 105%, rgba(224,123,42,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 50% 70% at 15% 40%,  rgba(26,51,71,0.85) 0%, transparent 65%),
        linear-gradient(155deg, #07111c 0%, #0f2035 45%, #0b1a28 100%);
    }
    .hero-grid {
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size:64px 64px;
    }
    .hero-orb { position:absolute; border-radius:50%; pointer-events:none; }
    .hero-orb-1 {
      width:480px; height:480px;
      background:radial-gradient(circle, rgba(224,123,42,0.13) 0%, transparent 70%);
      right:8%; top:12%; animation:floatOrb 7s ease-in-out infinite;
    }
    .hero-orb-2 {
      width:320px; height:320px;
      background:radial-gradient(circle, rgba(37,67,96,0.6) 0%, transparent 70%);
      left:-4%; bottom:15%; animation:floatOrb 9s ease-in-out 2s infinite;
    }
    .hero-skyline {
      position:absolute; bottom:0; left:0; right:0; width:100%;
      pointer-events:none; opacity:0; animation:fadeIn 1.2s ease 0.6s forwards;
    }
    .hero-art {
      position:absolute; right:4%; top:50%; transform:translateY(-50%);
      width:min(42vw,520px); pointer-events:none;
      opacity:0; animation:fadeInRight 1s ease 0.9s forwards;
    }
    .hero-content {
      position:relative; z-index:2; width:100%;
      max-width:1240px; margin:0 auto; padding:130px 64px 140px;
    }
    .hero-eyebrow {
      display:inline-flex; align-items:center; gap:10px;
      background:rgba(224,123,42,0.12); border:1px solid rgba(224,123,42,0.28);
      border-radius:100px; padding:9px 20px; margin-bottom:34px;
      color:var(--orange-2); font-size:11px; font-weight:600;
      letter-spacing:2px; text-transform:uppercase;
      opacity:0; animation:fadeInUp 0.7s ease 0.2s forwards;
    }
    .eyebrow-dot {
      width:6px; height:6px; background:var(--orange); border-radius:50%;
      animation:blink 2.4s ease-in-out infinite;
    }
    .hero-title {
      font-family:'Playfair Display',Georgia,serif;
      font-size:clamp(38px,5.2vw,68px); font-weight:700;
      line-height:1.09; color:var(--white); max-width:640px; margin-bottom:30px;
      opacity:0; animation:fadeInUp 0.7s ease 0.38s forwards;
    }
    .hero-title em { font-style:italic; color:var(--orange-2); }
    .hero-subtitle {
      font-size:16.5px; line-height:1.78; color:rgba(255,255,255,0.58);
      max-width:540px; margin-bottom:52px; font-weight:400;
      opacity:0; animation:fadeInUp 0.7s ease 0.54s forwards;
    }
    .hero-actions { opacity:0; animation:fadeInUp 0.7s ease 0.7s forwards; }
    .btn-primary {
      display:inline-flex; align-items:center; gap:13px;
      background:var(--orange); color:var(--white); text-decoration:none;
      padding:18px 38px; border-radius:var(--radius);
      font-size:11.5px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase;
      position:relative; overflow:hidden;
      transition:transform var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .btn-primary::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.18) 50%,transparent 100%);
      transform:translateX(-100%); transition:transform 0.55s ease;
    }
    .btn-primary:hover::after { transform:translateX(100%); }
    .btn-primary:hover { background:var(--orange-2); transform:translateY(-3px); box-shadow:0 16px 40px rgba(224,123,42,0.42); }
    .btn-primary svg { transition:transform var(--transition); }
    .btn-primary:hover svg { transform:translateX(4px); }
    .hero-scroll {
      position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:10px;
      z-index:3; opacity:0; animation:fadeIn 0.8s ease 1.6s forwards;
    }
    .hero-scroll span { font-size:9.5px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .scroll-bar { width:1.5px; height:52px; background:linear-gradient(to bottom,rgba(224,123,42,0.9),transparent); animation:scrollDrop 2s ease-in-out infinite; }

    /* ── SHARED ─────────────────────────────────────────────── */
    .section-wrap { max-width:1240px; margin:0 auto; padding:0 64px; }
    .section-label {
      display:inline-flex; align-items:center; gap:12px;
      font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
      color:var(--orange); margin-bottom:16px;
    }
    .section-label::before { content:''; width:28px; height:2px; background:var(--orange); border-radius:2px; }
    .section-heading { font-family:'Playfair Display',Georgia,serif; font-size:clamp(28px,3.2vw,44px); font-weight:700; line-height:1.18; color:var(--navy); }
    .btn-outline {
      display:inline-flex; align-items:center; gap:11px;
      border:2px solid var(--navy); color:var(--navy); text-decoration:none;
      padding:15px 34px; border-radius:var(--radius);
      font-size:11.5px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase;
      transition:all var(--transition);
    }
    .btn-outline:hover { background:var(--navy); color:var(--white); transform:translateY(-2px); box-shadow:0 12px 32px rgba(13,31,45,0.18); }
    .btn-outline svg { transition:transform var(--transition); }
    .btn-outline:hover svg { transform:translateX(4px); }

    /* ── SERVICES ───────────────────────────────────────────── */
    .services { padding:108px 0; background:var(--white); }
    .services-header { margin-bottom:56px; }
    .service-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; background:var(--gray-200); border-radius:14px; overflow:hidden; border:3px solid var(--gray-200); }
    .service-card {
      background:var(--white); padding:42px 40px; position:relative;
      transition:background var(--transition),transform var(--transition),box-shadow var(--transition);
      cursor:default; overflow:hidden;
    }
    .service-card::before { content:''; position:absolute; top:0; left:0; width:0; height:3px; background:linear-gradient(90deg,var(--orange),var(--orange-2)); transition:width var(--transition); }
    .service-card:hover { background:var(--gray-50); transform:scale(1.012); box-shadow:0 24px 64px rgba(13,31,45,0.09); z-index:1; }
    .service-card:hover::before { width:100%; }
    .service-icon-wrap {
      width:54px; height:54px; background:var(--orange-pale); border-radius:13px;
      display:flex; align-items:center; justify-content:center; margin-bottom:22px;
      transition:background var(--transition),transform var(--transition);
    }
    .service-icon-wrap svg { width:24px; height:24px; stroke:var(--orange); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; transition:stroke var(--transition); }
    .service-card:hover .service-icon-wrap { background:var(--orange); transform:rotate(6deg) scale(1.05); }
    .service-card:hover .service-icon-wrap svg { stroke:var(--white); }
    .service-name { font-size:16px; font-weight:600; color:var(--navy); margin-bottom:11px; line-height:1.35; }
    .service-desc { font-size:13.5px; line-height:1.72; color:var(--gray-600); }
    .services-cta { display:flex; justify-content:center; margin-top:60px; }

    /* ── PROPERTY BAND ──────────────────────────────────────── */
    .property-band { position:relative; height:420px; overflow:hidden; background:var(--navy-mid); }
    .property-band-bg {
      position:absolute; inset:0;
      background:
        linear-gradient(to right,rgba(13,31,45,0.92) 30%,rgba(13,31,45,0.4) 100%),
        repeating-linear-gradient(90deg,rgba(255,255,255,0.015) 0px,rgba(255,255,255,0.015) 1px,transparent 1px,transparent 60px);
    }
    .property-band svg.house-art { position:absolute; right:0; bottom:0; height:100%; width:65%; opacity:0.18; }
    .property-band-content {
      position:relative; z-index:2; max-width:1240px; margin:0 auto; padding:0 64px;
      height:100%; display:flex; flex-direction:column; justify-content:center;
    }
    .property-band-content blockquote {
      font-family:'Playfair Display',Georgia,serif;
      font-size:clamp(22px,2.8vw,36px); font-style:italic;
      color:var(--white); max-width:560px; line-height:1.42; margin-bottom:28px;
    }
    .property-band-content cite {
      display:flex; align-items:center; gap:14px; font-style:normal;
      color:rgba(255,255,255,0.55); font-size:12px; font-weight:600;
      letter-spacing:1.6px; text-transform:uppercase;
    }
    .property-band-content cite::before { content:''; width:36px; height:1.5px; background:var(--orange); }

    /* ── DIFFERENCE ─────────────────────────────────────────── */
    .difference { padding:108px 0; background:var(--gray-50); }
    .difference-header { margin-bottom:56px; }
    .diff-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:22px; }
    .diff-card {
      background:var(--white); border-radius:14px; padding:40px 30px 36px;
      position:relative; overflow:hidden;
      transition:transform var(--transition),box-shadow var(--transition);
    }
    .diff-card::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,var(--orange),var(--orange-2));
      transform:scaleX(0); transform-origin:left; transition:transform var(--transition);
    }
    .diff-card:hover { transform:translateY(-10px); box-shadow:0 28px 64px rgba(13,31,45,0.13); }
    .diff-card:hover::after { transform:scaleX(1); }
    .diff-card.featured { background:var(--navy); }
    .diff-card.featured::after { transform:scaleX(1); }
    .diff-num { font-family:'Playfair Display',Georgia,serif; font-size:56px; font-weight:700; line-height:1; color:var(--gray-200); margin-bottom:22px; }
    .diff-card.featured .diff-num { color:rgba(255,255,255,0.08); }
    .diff-icon-wrap {
      width:48px; height:48px; background:var(--orange-pale); border-radius:11px;
      display:flex; align-items:center; justify-content:center; margin-bottom:20px;
      transition:background var(--transition),transform var(--transition);
    }
    .diff-icon-wrap svg { width:22px; height:22px; stroke:var(--orange); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
    .diff-card.featured .diff-icon-wrap { background:rgba(224,123,42,0.18); }
    .diff-card:hover .diff-icon-wrap { background:var(--orange); transform:rotate(5deg); }
    .diff-card:hover .diff-icon-wrap svg { stroke:var(--white); }
    .diff-card.featured:hover .diff-icon-wrap { background:rgba(224,123,42,0.35); }
    .diff-title { font-size:16px; font-weight:600; color:var(--navy); margin-bottom:14px; line-height:1.32; }
    .diff-card.featured .diff-title { color:var(--white); }
    .diff-body { font-size:13.5px; line-height:1.72; color:var(--gray-600); }
    .diff-card.featured .diff-body { color:rgba(255,255,255,0.58); }
    .difference-cta { display:flex; justify-content:center; margin-top:60px; }

    /* ── FOOTER ─────────────────────────────────────────────── */
    .footer { background:var(--navy); padding:54px 64px; }
    .footer-inner { max-width:1240px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:28px; }
    .footer-brand { display:flex; align-items:center; gap:14px; }
    .footer-name { font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--white); margin-bottom:3px; }
    .footer-copy { font-size:11.5px; color:rgba(255,255,255,0.38); letter-spacing:0.5px; }
    .footer-links { list-style:none; display:flex; flex-wrap:wrap; gap:28px; }
    .footer-links a { font-size:10.5px; font-weight:600; letter-spacing:1.8px; text-transform:uppercase; color:rgba(255,255,255,0.45); text-decoration:none; transition:color var(--transition); }
    .footer-links a:hover { color:var(--orange-2); }

    /* ── FLOATING BUTTONS ───────────────────────────────────── */
    .fab-group { position:fixed; right:0; top:50%; transform:translateY(-50%); z-index:800; display:flex; flex-direction:column; gap:10px; }
    .fab {
      display:flex; align-items:center; gap:10px; text-decoration:none;
      padding:13px 14px; border-radius:10px 0 0 10px; color:var(--white);
      font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.4px; white-space:nowrap;
      transform:translateX(calc(100% - 48px));
      transition:transform 0.35s cubic-bezier(0.4,0,0.2,1), box-shadow 0.35s ease;
      box-shadow:-4px 4px 20px rgba(0,0,0,0.2);
    }
    .fab:hover { transform:translateX(0); box-shadow:-6px 6px 28px rgba(0,0,0,0.28); }
    .fab svg { width:22px; height:22px; flex-shrink:0; order:2; }
    .fab-label { order:1; }
    .fab-whatsapp { background:#25d366; }
    .fab-whatsapp:hover { background:#1ebe5d; }
    .fab-message { background:var(--orange); }
    .fab-message:hover { background:var(--orange-2); }

    /* ── SCROLL REVEAL ──────────────────────────────────────── */
    .reveal,.reveal-l,.reveal-r { opacity:0; transition:opacity 0.75s ease,transform 0.75s ease; }
    .reveal   { transform:translateY(40px); }
    .reveal-l { transform:translateX(-40px); }
    .reveal-r { transform:translateX(40px); }
    .reveal.in,.reveal-l.in,.reveal-r.in { opacity:1; transform:translate(0); }
    .stagger > * { opacity:0; transform:translateY(36px); transition:opacity 0.55s ease,transform 0.55s ease; }
    .stagger.in > *:nth-child(1){ opacity:1;transform:none;transition-delay:0s; }
    .stagger.in > *:nth-child(2){ opacity:1;transform:none;transition-delay:0.08s; }
    .stagger.in > *:nth-child(3){ opacity:1;transform:none;transition-delay:0.16s; }
    .stagger.in > *:nth-child(4){ opacity:1;transform:none;transition-delay:0.24s; }
    .stagger.in > *:nth-child(5){ opacity:1;transform:none;transition-delay:0.32s; }
    .stagger.in > *:nth-child(6){ opacity:1;transform:none;transition-delay:0.40s; }
    .stagger.in > *:nth-child(7){ opacity:1;transform:none;transition-delay:0.48s; }
    .stagger.in > *:nth-child(8){ opacity:1;transform:none;transition-delay:0.56s; }

    /* ── KEYFRAMES ──────────────────────────────────────────── */
    @keyframes fadeInUp  { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInRight { from{opacity:0;transform:translate(40px,-50%)} to{opacity:1;transform:translate(0,-50%)} }
    @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
    @keyframes floatOrb  { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-28px) scale(1.04)} }
    @keyframes blink     { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.4)} }
    @keyframes scrollDrop{ 0%,100%{transform:scaleY(1);opacity:1} 50%{transform:scaleY(0.5);opacity:0.4} }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="nav" id="mainNav">
  <a href="#" class="nav-logo">
    <svg class="nav-logo-icon" viewBox="0 0 38 38" fill="none">
      <path d="M19 2L34 11V27L19 36L4 27V11L19 2Z" fill="#e07b2a"/>
      <path d="M19 8.5L28.5 14V25L19 30.5L9.5 25V14L19 8.5Z" fill="#0d1f2d"/>
      <path d="M19 15L23.5 17.6V23L19 25.6L14.5 23V17.6L19 15Z" fill="#e07b2a"/>
    </svg>
    <span class="nav-logo-text" id="cms-nav-brand">BRIGHTSTONE</span>
  </a>
  <ul class="nav-list" id="cms-nav-links"></ul>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-orb hero-orb-1"></div>
  <div class="hero-orb hero-orb-2"></div>

  <svg class="hero-art" viewBox="0 0 520 480" fill="none" aria-hidden="true">
    <circle cx="260" cy="240" r="200" stroke="rgba(224,123,42,0.06)" stroke-width="1"/>
    <circle cx="260" cy="240" r="150" stroke="rgba(224,123,42,0.04)" stroke-width="1"/>
    <rect x="190" y="60" width="80" height="360" rx="4" fill="rgba(26,51,71,0.75)"/>
    <rect x="190" y="60" width="80" height="4" fill="rgba(224,123,42,0.6)"/>
    <rect x="200" y="80"  width="14" height="14" rx="2" fill="rgba(224,123,42,0.55)"/>
    <rect x="222" y="80"  width="14" height="14" rx="2" fill="rgba(224,123,42,0.3)"/>
    <rect x="244" y="80"  width="14" height="14" rx="2" fill="rgba(224,123,42,0.6)"/>
    <rect x="200" y="108" width="14" height="14" rx="2" fill="rgba(224,123,42,0.25)"/>
    <rect x="222" y="108" width="14" height="14" rx="2" fill="rgba(224,123,42,0.7)"/>
    <rect x="244" y="108" width="14" height="14" rx="2" fill="rgba(224,123,42,0.4)"/>
    <rect x="200" y="136" width="14" height="14" rx="2" fill="rgba(224,123,42,0.55)"/>
    <rect x="222" y="136" width="14" height="14" rx="2" fill="rgba(224,123,42,0.35)"/>
    <rect x="244" y="136" width="14" height="14" rx="2" fill="rgba(224,123,42,0.6)"/>
    <rect x="200" y="164" width="14" height="14" rx="2" fill="rgba(224,123,42,0.3)"/>
    <rect x="222" y="164" width="14" height="14" rx="2" fill="rgba(224,123,42,0.55)"/>
    <rect x="244" y="164" width="14" height="14" rx="2" fill="rgba(224,123,42,0.45)"/>
    <rect x="100" y="130" width="70" height="290" rx="4" fill="rgba(20,42,60,0.7)"/>
    <rect x="100" y="130" width="70" height="4" fill="rgba(224,123,42,0.4)"/>
    <rect x="110" y="150" width="12" height="12" rx="2" fill="rgba(224,123,42,0.45)"/>
    <rect x="130" y="150" width="12" height="12" rx="2" fill="rgba(224,123,42,0.25)"/>
    <rect x="150" y="150" width="12" height="12" rx="2" fill="rgba(224,123,42,0.55)"/>
    <rect x="290" y="100" width="65" height="320" rx="4" fill="rgba(22,46,65,0.72)"/>
    <rect x="290" y="100" width="65" height="4" fill="rgba(224,123,42,0.45)"/>
    <rect x="299" y="120" width="12" height="12" rx="2" fill="rgba(224,123,42,0.6)"/>
    <rect x="319" y="120" width="12" height="12" rx="2" fill="rgba(224,123,42,0.35)"/>
    <rect x="339" y="120" width="12" height="12" rx="2" fill="rgba(224,123,42,0.5)"/>

<script>
/* ─── ICON MAP ───────────────────────────────────────────────── */
const ICONS = {
  operations:    `<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>`,
  advisory:      `<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>`,
  amenities:     `<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>`,
  finance:       `<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>`,
  technology:    `<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>`,
  sustainability:`<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>`,
  'supply-chain':`<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>`,
  risk:          `<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
  team:          `<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>`,
  chart:         `<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>`,
  home:          `<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
  smart:         `<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M7 10h10"/><path d="M7 7h4"/>`
};

function iconSVG(name, size = 24) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[name] || ICONS.operations}</svg>`;
}

function arrowSVG() {
  return `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function escapeHTML(value = '') {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

/* ─── CONTENT LOADER ─────────────────────────────────────────── */
fetch('content.json')
  .then(r => r.json())
  .then(d => {

    /* NAV */
    document.getElementById('cms-nav-brand').textContent = d.nav.brand;
    const navLinks = Array.isArray(d.nav.links) && d.nav.links.length
      ? d.nav.links
      : [
          { label: 'Home', url: '#hero' },
          { label: 'About Us', url: '#' },
          { label: 'Careers', url: '#' },
          { label: 'Contact Us', url: '#' }
        ];
    document.getElementById('cms-nav-links').innerHTML = navLinks
      .map(l => `<li><a href="${escapeHTML(l.url || '#')}">${escapeHTML(l.label || '')}</a></li>`)
      .join('');

    /* HERO */
    document.getElementById('cms-hero-eyebrow').innerHTML =
      `<span class="eyebrow-dot" aria-hidden="true"></span>${escapeHTML(d.hero.eyebrow)}`;
    document.getElementById('cms-hero-title').innerHTML =
      `${escapeHTML(d.hero.title_prefix)}<br><em>${escapeHTML(d.hero.title_italic)}</em> ${escapeHTML(d.hero.title_suffix)}`;
    document.getElementById('cms-hero-subtitle').textContent = d.hero.subtitle;
    const heroCta = document.getElementById('cms-hero-cta');
    heroCta.href = d.hero.cta_url || '#difference';
    heroCta.innerHTML = d.hero.cta + ' ' + arrowSVG();

    /* SERVICES */
    document.getElementById('cms-services-label').textContent   = d.services.label;
    document.getElementById('cms-services-heading').textContent = d.services.heading;
    document.getElementById('cms-service-grid').innerHTML = d.services.items.map(item => `
      <div class="service-card">
        <div class="service-icon-wrap" aria-hidden="true">${iconSVG(item.icon)}</div>
        <h3 class="service-name">${escapeHTML(item.title)}</h3>
        <p class="service-desc">${escapeHTML(item.desc)}</p>
      </div>`).join('');
    const svcCta = document.getElementById('cms-services-cta');
    svcCta.href = d.services.cta_url || '#';
    svcCta.innerHTML = d.services.cta + ' ' + arrowSVG();

    /* QUOTE */
    document.getElementById('cms-quote-text').textContent = d.quote.text;
    document.getElementById('cms-quote-cite').textContent = d.quote.attribution;

    /* DIFFERENCE */
    document.getElementById('cms-diff-label').textContent   = d.difference.label;
    document.getElementById('cms-diff-heading').textContent = d.difference.heading;
    document.getElementById('cms-diff-grid').innerHTML = d.difference.items.map(item => `
      <div class="diff-card${item.featured ? ' featured' : ''}">
        <div class="diff-num" aria-hidden="true">${escapeHTML(item.num)}</div>
        <div class="diff-icon-wrap" aria-hidden="true">${iconSVG(item.icon, 22)}</div>
        <h3 class="diff-title">${escapeHTML(item.title)}</h3>
        <p class="diff-body">${escapeHTML(item.desc)}</p>
      </div>`).join('');
    const diffCta = document.getElementById('cms-diff-cta');
    diffCta.href = d.difference.cta_url || '#';
    diffCta.innerHTML = d.difference.cta + ' ' + arrowSVG();

    /* FOOTER */
    document.getElementById('cms-footer-inner').innerHTML = `
      <div class="footer-brand">
        <svg width="34" height="34" viewBox="0 0 38 38" fill="none" aria-hidden="true">
          <path d="M19 2L34 11V27L19 36L4 27V11L19 2Z" fill="#e07b2a"/>
          <path d="M19 8.5L28.5 14V25L19 30.5L9.5 25V14L19 8.5Z" fill="#0d1f2d"/>
          <path d="M19 15L23.5 17.6V23L19 25.6L14.5 23V17.6L19 15Z" fill="#e07b2a"/>
        </svg>
        <div>
          <div class="footer-name">${d.footer.brand}</div>
          <div class="footer-copy">${d.footer.copyright}</div>
        </div>
      </div>
      <ul class="footer-links">
        ${d.footer.links.map(l => `<li><a href="${escapeHTML(l.url || '#')}">${escapeHTML(l.label || '')}</a></li>`).join('')}
      </ul>`;

    /* FABs */
    document.getElementById('cms-fab-wa').href  = d.contact.whatsapp;
    document.getElementById('cms-fab-msg').href = d.contact.email;

  })
  .catch(() => console.warn('content.json not found — running with empty content'));

/* ─── NAVBAR SCROLL ──────────────────────────────────────────── */
const nav = document.getElementById('mainNav');
const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 48);
window.addEventListener('scroll', onScroll, { passive: true });
onScroll();

/* ─── SCROLL REVEAL ──────────────────────────────────────────── */
const observer = new IntersectionObserver(
  entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }),
  { threshold: 0.12, rootMargin: '0px 0px -60px 0px' }
);
const observe = () => document.querySelectorAll('.reveal,.reveal-l,.reveal-r,.stagger').forEach(el => observer.observe(el));
// Re-observe after content loads (cards are injected by JS)
window.addEventListener('load', observe);
setTimeout(observe, 500);
</script>
</body>
</html>
