<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brightstone — Residential Property Management Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:        #0d1f2d;
      --navy-mid:    #1a3347;
      --navy-light:  #254360;
      --orange:      #e07b2a;
      --orange-2:    #f0952a;
      --orange-pale: #fff3e6;
      --white:       #ffffff;
      --gray-50:     #f7f9fb;
      --gray-100:    #eef1f5;
      --gray-200:    #dde3ea;
      --gray-400:    #96aabb;
      --gray-600:    #5a7080;
      --text:        #0d1f2d;
      --radius:      10px;
      --transition:  0.35s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; font-size:16px; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: var(--white);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAVBAR ─────────────────────────────────────────────── */
    .nav {
      position: fixed; inset: 0 0 auto 0; z-index: 900;
      padding: 22px 64px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background var(--transition), padding var(--transition), box-shadow var(--transition);
    }
    .nav.scrolled {
      background: rgba(10,20,32,0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 15px 64px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.35);
    }
    .nav-logo { display:flex; align-items:center; gap:11px; text-decoration:none; }
    .nav-logo-icon { width:38px; height:38px; flex-shrink:0; }
    .nav-logo-text { font-size:17px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--white); }
    .nav-list { list-style:none; display:flex; gap:44px; }
    .nav-list a {
      font-size:11.5px; font-weight:600; letter-spacing:1.8px; text-transform:uppercase;
      color:rgba(255,255,255,0.72); text-decoration:none;
      position:relative; padding-bottom:3px; transition:color var(--transition);
    }
    .nav-list a::after {
      content:''; position:absolute; bottom:0; left:0;
      width:0; height:1.5px; background:var(--orange); transition:width var(--transition);
    }
    .nav-list a:hover { color:var(--white); }
    .nav-list a:hover::after { width:100%; }

    /* ── HERO ───────────────────────────────────────────────── */
    .hero {
      position:relative; min-height:100svh;
      display:flex; align-items:center; overflow:hidden; background:var(--navy);
    }
    .hero-bg {
      position:absolute; inset:0;
      background:
        radial-gradient(ellipse 90% 55% at 75% 105%, rgba(224,123,42,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 50% 70% at 15% 40%,  rgba(26,51,71,0.85) 0%, transparent 65%),
        linear-gradient(155deg, #07111c 0%, #0f2035 45%, #0b1a28 100%);
    }
    .hero-grid {
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size:64px 64px;
    }
    .hero-orb { position:absolute; border-radius:50%; pointer-events:none; }
    .hero-orb-1 {
      width:480px; height:480px;
      background:radial-gradient(circle, rgba(224,123,42,0.13) 0%, transparent 70%);
      right:8%; top:12%; animation:floatOrb 7s ease-in-out infinite;
    }
    .hero-orb-2 {
      width:320px; height:320px;
      background:radial-gradient(circle, rgba(37,67,96,0.6) 0%, transparent 70%);
      left:-4%; bottom:15%; animation:floatOrb 9s ease-in-out 2s infinite;
    }
    .hero-skyline {
      position:absolute; bottom:0; left:0; right:0; width:100%;
      pointer-events:none; opacity:0; animation:fadeIn 1.2s ease 0.6s forwards;
    }
    .hero-art {
      position:absolute; right:4%; top:50%; transform:translateY(-50%);
      width:min(42vw,520px); pointer-events:none;
      opacity:0; animation:fadeInRight 1s ease 0.9s forwards;
    }
    .hero-content {
      position:relative; z-index:2; width:100%;
      max-width:1240px; margin:0 auto; padding:130px 64px 140px;
    }
    .hero-eyebrow {
      display:inline-flex; align-items:center; gap:10px;
      background:rgba(224,123,42,0.12); border:1px solid rgba(224,123,42,0.28);
      border-radius:100px; padding:9px 20px; margin-bottom:34px;
      color:var(--orange-2); font-size:11px; font-weight:600;
      letter-spacing:2px; text-transform:uppercase;
      opacity:0; animation:fadeInUp 0.7s ease 0.2s forwards;
    }
    .eyebrow-dot {
      width:6px; height:6px; background:var(--orange); border-radius:50%;
      animation:blink 2.4s ease-in-out infinite;
    }
    .hero-title {
      font-family:'Playfair Display',Georgia,serif;
      font-size:clamp(38px,5.2vw,68px); font-weight:700;
      line-height:1.09; color:var(--white); max-width:640px; margin-bottom:30px;
      opacity:0; animation:fadeInUp 0.7s ease 0.38s forwards;
    }
    .hero-title em { font-style:italic; color:var(--orange-2); }
    .hero-subtitle {
      font-size:16.5px; line-height:1.78; color:rgba(255,255,255,0.58);
      max-width:540px; margin-bottom:52px; font-weight:400;
      opacity:0; animation:fadeInUp 0.7s ease 0.54s forwards;
    }
    .hero-actions { opacity:0; animation:fadeInUp 0.7s ease 0.7s forwards; }
    .btn-primary {
      display:inline-flex; align-items:center; gap:13px;
      background:var(--orange); color:var(--white); text-decoration:none;
      padding:18px 38px; border-radius:var(--radius);
      font-size:11.5px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase;
      position:relative; overflow:hidden;
      transition:transform var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .btn-primary::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.18) 50%,transparent 100%);
      transform:translateX(-100%); transition:transform 0.55s ease;
    }
    .btn-primary:hover::after { transform:translateX(100%); }
    .btn-primary:hover { background:var(--orange-2); transform:translateY(-3px); box-shadow:0 16px 40px rgba(224,123,42,0.42); }
    .btn-primary svg { transition:transform var(--transition); }
    .btn-primary:hover svg { transform:translateX(4px); }
    .hero-scroll {
      position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:10px;
      z-index:3; opacity:0; animation:fadeIn 0.8s ease 1.6s forwards;
    }
    .hero-scroll span { font-size:9.5px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .scroll-bar { width:1.5px; height:52px; background:linear-gradient(to bottom,rgba(224,123,42,0.9),transparent); animation:scrollDrop 2s ease-in-out infinite; }

    /* ── SHARED ─────────────────────────────────────────────── */
    .section-wrap { max-width:1240px; margin:0 auto; padding:0 64px; }
    .section-label {
      display:inline-flex; align-items:center; gap:12px;
      font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
      color:var(--orange); margin-bottom:16px;
    }
    .section-label::before { content:''; width:28px; height:2px; background:var(--orange); border-radius:2px; }
    .section-heading { font-family:'Playfair Display',Georgia,serif; font-size:clamp(28px,3.2vw,44px); font-weight:700; line-height:1.18; color:var(--navy); }
    .btn-outline {
      display:inline-flex; align-items:center; gap:11px;
      border:2px solid var(--navy); color:var(--navy); text-decoration:none;
      padding:15px 34px; border-radius:var(--radius);
      font-size:11.5px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase;
      transition:all var(--transition);
    }
    .btn-outline:hover { background:var(--navy); color:var(--white); transform:translateY(-2px); box-shadow:0 12px 32px rgba(13,31,45,0.18); }
    .btn-outline svg { transition:transform var(--transition); }
    .btn-outline:hover svg { transform:translateX(4px); }

    /* ── SERVICES ───────────────────────────────────────────── */
    .services { padding:108px 0; background:var(--white); }
    .services-header { margin-bottom:56px; }
    .service-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; background:var(--gray-200); border-radius:14px; overflow:hidden; border:3px solid var(--gray-200); }
    .service-card {
      background:var(--white); padding:42px 40px; position:relative;
      transition:background var(--transition),transform var(--transition),box-shadow var(--transition);
      cursor:default; overflow:hidden;
    }
    .service-card::before { content:''; position:absolute; top:0; left:0; width:0; height:3px; background:linear-gradient(90deg,var(--orange),var(--orange-2)); transition:width var(--transition); }
    .service-card:hover { background:var(--gray-50); transform:scale(1.012); box-shadow:0 24px 64px rgba(13,31,45,0.09); z-index:1; }
    .service-card:hover::before { width:100%; }
    .service-icon-wrap {
      width:54px; height:54px; background:var(--orange-pale); border-radius:13px;
      display:flex; align-items:center; justify-content:center; margin-bottom:22px;
      transition:background var(--transition),transform var(--transition);
    }
    .service-icon-wrap svg { width:24px; height:24px; stroke:var(--orange); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; transition:stroke var(--transition); }
    .service-card:hover .service-icon-wrap { background:var(--orange); transform:rotate(6deg) scale(1.05); }
    .service-card:hover .service-icon-wrap svg { stroke:var(--white); }
    .service-name { font-size:16px; font-weight:600; color:var(--navy); margin-bottom:11px; line-height:1.35; }
    .service-desc { font-size:13.5px; line-height:1.72; color:var(--gray-600); }
    .services-cta { display:flex; justify-content:center; margin-top:60px; }
  </style>
</head>
<body>
  <main>
    <h1>BridgeStone</h1>
    <p>Initial upload in progress.</p>
  </main>
</body>
</html>
